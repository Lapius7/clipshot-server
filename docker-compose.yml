services:
  clipshot-server:
    build: .
    # image: ghcr.io/lap7/clipshot-server:latest
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./data:/data
    environment:
      - BASE_URL=${BASE_URL:?set BASE_URL to your public https URL, e.g. https://img.example.com}
      - PORT=${PORT:-8080}
      - DATA_DIR=/data
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-25}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-30}
      - RATE_LIMIT_BURST=${RATE_LIMIT_BURST:-10}
